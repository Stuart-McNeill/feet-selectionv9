<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Clinical Foot Engine - Exploration & Diagnosis Mode</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #0a0a0c; 
            touch-action: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #8a8a93;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: #ff4400;
            border-color: #ff5511;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 68, 0, 0.4);
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        #diagnostic-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 380px;
            max-height: 400px;
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 1000;
        }

        .diag-title { 
            font-size: 14px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #ff4400; 
            margin-bottom: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 5px;
        }

        .diag-card { 
            background: rgba(255,255,255,0.04); 
            padding: 10px; 
            border-radius: 4px; 
            margin-bottom: 6px; 
            border-left: 3px solid #00bcff; 
        }
        
        .diag-card.superficial { border-left-color: #00ff66; }
        .diag-card.mid { border-left-color: #00bcff; }
        .diag-card.deep { border-left-color: #ffcc00; }
        
        .struct-label { font-size: 13px; font-weight: 600; color: #fff; }
        .struct-type { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .pathologies { font-size: 11px; color: #ff8888; margin-top: 4px; font-style: italic; }
        .anatomy-desc { font-size: 11px; color: #b3b3b3; margin-top: 2px; }
    </style>
</head>
<body>

<div id="control-panel">
    <button id="btn-explore" class="mode-btn active">Move / Rotate</button>
    <button id="btn-diagnose" class="mode-btn">Probe Anatomy</button>
</div>

<div id="diagnostic-overlay">
    <div class="diag-title">Anatomical Identification Layer</div>
    <div id="diagnostic-results">Select "Probe Anatomy" mode, then click anywhere on the foot structure to calculate depth metrics...</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const PRESET_REGIONS = [
  { name: "Left foot - Dorsal Hallux Toenail", pos: [-0.11115, 0.098, 0.465], rot: [0, 0.01, 0], scale: [0.05, 0.015, 0.05] },
  { name: "Left foot - Dorsal Hallux Interphalangeal joint", pos: [-0.11861, 0.12358, 0.38303], rot: [0.27154, 0.11557, 0.02229], scale: [0.08201, 0.02999, 0.02419] },
  { name: "Left foot - Lateral Hallux Interphalangeal joint", pos: [-0.08142, 0.06081, 0.37553], rot: [0.06665, 0.19010, 0.00526], scale: [0.01348, 0.07351, 0.02105] },
  { name: "Left foot - Medial Hallux Interphalangeal joint", pos: [-0.16746, 0.06292, 0.38540], rot: [0.00000, 0.00000, 0.00000], scale: [0.01244, 0.06737, 0.01645] },
  { name: "Left foot - Plantar Hallux Interphalangeal joint", pos: [-0.12047, 0.02169, 0.38239], rot: [-0.00636, 0.08653, -0.05221], scale: [0.10000, 0.02114, 0.01632] },
  { name: "Left foot - Hallux Apex", pos: [-0.11505, 0.069, 0.490], rot: [0.235, 0.097, -0.009], scale: [0.08, 0.05, 0.015] },
  { name: "Left foot - Lateral Hallux", pos: [-0.07560, 0.06849, 0.40518], rot: [-0.03458, 0.05742, 0.06437], scale: [0.02562, 0.08314, 0.14051] },
  { name: "Left foot - Medial Hallux", pos: [-0.15606, 0.06700, 0.40831], rot: [0.00000, 0.11673, 0.00000], scale: [0.03781, 0.06493, 0.15382] },
  { name: "Left foot - Dorsal Hallux", pos: [-0.11970, 0.103, 0.380], rot: [0.138, 0.081, 0.009], scale: [0.10, 0.033, 0.12] },
  { name: "Left foot - Plantar Hallux", pos: [-0.12036, 0.03208, 0.41179], rot: [0.00000, 0.00000, 0.00000], scale: [0.10000, 0.03388, 0.15863] },
  { name: "Left foot - Dorsal 1st Metatarsophalangeal joint", pos: [-0.13368, 0.14932, 0.27846], rot: [0.29071, 0.05714, 0.07830], scale: [0.11730, 0.05807, 0.12003] },
  { name: "Left foot - Medial 1st Metatarsophalangeal joint", pos: [-0.17744, 0.07693, 0.26768], rot: [0.01554, 0.00000, 0.00000], scale: [0.03671, 0.10974, 0.13937] },
  { name: "Left foot - Plantar 1st Metatarsophalangeal joint", pos: [-0.12227, 0.02006, 0.25386], rot: [0.00000, 0.00000, 0.00000], scale: [0.12576, 0.03151, 0.15248] },
  { name: "Left foot - Plantar Tibial Sesamoid", pos: [-0.15245, 0.00588, 0.23175], rot: [0.00000, 0.00000, 0.00000], scale: [0.04774, 0.02183, 0.04182] },
  { name: "Left foot - Plantar Fibular Sesamoid", pos: [-0.08952, 0.00688, 0.23350], rot: [0.00000, 0.00000, 0.00000], scale: [0.04182, 0.02520, 0.03852] },
  { name: "Left foot - Dorsal 1st Metatarsal", pos: [-0.13058, 0.19897, 0.12122], rot: [0.32092, -0.04192, 0.08089], scale: [0.10811, 0.10000, 0.23570] },
  { name: "Left foot - Medial 1st Metatarsal", pos: [-0.16198, 0.10509, 0.13224], rot: [0.15718, -0.05458, 0.00836], scale: [0.03988, 0.11276, 0.30453] },
  { name: "Left foot - Plantar 1st Metatarsal", pos: [-0.12261, 0.03913, 0.07892], rot: [0.13096, -0.00243, 0.00878], scale: [0.10220, 0.06527, 0.23585] },
  { name: "Left foot - Dorsal Navicular", pos: [-0.05302, 0.29923, -0.07043], rot: [0.35370, -0.00807, -0.02131], scale: [0.18135, 0.10000, 0.06765] },
  { name: "Left foot - Plantar tubercle of the calcaneus", pos: [-0.01210, 0.00936, -0.34873], rot: [0.00000, 0.00000, 0.00000], scale: [0.10823, 0.10000, 0.10870] }
];

const urls = {
    left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
    right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"
};

let scene, camera, renderer, controls;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let currentFoot = "left";
let footGroup = new THREE.Group();
let markerGroup = new THREE.Group();
let regionGroup = new THREE.Group(); 
let isLoaded = false;
let currentAppMode = "explore"; // Switch variants: "explore" or "diagnose"
let jsonDatabase = null;

init();

async function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0c);
    camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 3.0));
    scene.add(footGroup);
    scene.add(markerGroup);
    scene.add(regionGroup);

    PRESET_REGIONS.forEach(data => addRegionVolumeBox(data.name, data.pos, data.rot, data.scale));

    // Async Fetch configuration handling target json structure natively
    try {
        const response = await fetch('anatomy_tracer.json');
        jsonDatabase = await response.json();
    } catch (e) {
        console.error("Critical: 'anatomy_tracer.json' database template unavailable.", e);
    }

    setupInterfaceButtons();
    renderer.domElement.addEventListener("click", handleModelInteraction);
    window.addEventListener("resize", onResize);
    loadFootMesh();
    animate();
}

function setupInterfaceButtons() {
    const btnExplore = document.getElementById("btn-explore");
    const btnDiagnose = document.getElementById("btn-diagnose");
    const resultBox = document.getElementById("diagnostic-results");

    btnExplore.addEventListener("click", () => {
        currentAppMode = "explore";
        btnExplore.className = "mode-btn active";
        btnDiagnose.className = "mode-btn";
        controls.enabled = true; // OrbitControls enabled to safely move, pan and spin the viewport
        resultBox.innerHTML = "Navigating mode active. Rotate, pan, and view the foot layout freely.";
    });

    btnDiagnose.addEventListener("click", () => {
        currentAppMode = "diagnose";
        btnExplore.className = "mode-btn";
        btnDiagnose.className = "mode-btn active";
        controls.enabled = false; // Freeze viewport adjustment movements to trap clicks perfectly as precision ray-casts
        resultBox.innerHTML = "Probe active. Click an isolated anatomical layer to extract diagnostic properties...";
    });
}

function addRegionVolumeBox(name, pos, rot, scale) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({visible: false}));
    mesh.position.set(...pos);
    mesh.rotation.set(...rot);
    mesh.scale.set(...scale);
    mesh.userData.name = name;
    regionGroup.add(mesh);
}

function handleModelInteraction(e) {
    if (!isLoaded || currentAppMode !== "diagnose") return;
    
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    processAnatomicalLayers();
}

// Low-Level Raycast Vector-Line-Segment Calculus
function calculateDistanceToTrackSegment(probePoint, nodeA, nodeB) {
    const ab = new THREE.Vector3().subVectors(nodeB, nodeA);
    const ap = new THREE.Vector3().subVectors(probePoint, nodeA);
    let projectionScalar = ap.dot(ab) / ab.lengthSq();
    projectionScalar = Math.max(0, Math.min(1, projectionScalar)); // Clamp mathematically directly onto segment bounds
    const intersectionNode = new THREE.Vector3().copy(nodeA).addScaledVector(ab, projectionScalar);
    return probePoint.distanceTo(intersectionNode);
}

function processAnatomicalLayers() {
    raycaster.setFromCamera(mouse, camera);
    const geometryIntersections = raycaster.intersectObjects(footGroup.children, true);
    
    if (geometryIntersections.length === 0) return;

    const absoluteClickPoint = geometryIntersections[0].point;
    
    // Clear legacy validation pin indicators, drop precise target pinpoint mesh
    markerGroup.clear();
    const pin = new THREE.Mesh(new THREE.SphereGeometry(0.005), new THREE.MeshBasicMaterial({ color: 0xff4400 }));
    pin.position.copy(absoluteClickPoint);
    markerGroup.add(pin);

    let activeVolumeRegion = "Undefined Surface Plane";
    let identifyDorsalAspect = true;

    // Volume Bounding Evaluator
    regionGroup.children.forEach(box => {
        const lateralPrefix = currentFoot === "left" ? "Left foot" : "Right foot";
        if (!box.userData.name.includes(lateralPrefix)) return;

        const inverseTransformedCoord = absoluteClickPoint.clone().applyMatrix4(box.matrixWorld.clone().invert());
        if (Math.abs(inverseTransformedCoord.x) < 0.5 && Math.abs(inverseTransformedCoord.y) < 0.5 && Math.abs(inverseTransformedCoord.z) < 0.5) {
            activeVolumeRegion = box.userData.name;
            if (activeVolumeRegion.toLowerCase().includes("plantar") || activeVolumeRegion.toLowerCase().includes("tubercle")) {
                identifyDorsalAspect = false;
            }
        }
    });

    let layerStackList = [];

    // Layer 1: Superficial / Surface Envelope Definition
    layerStackList.push({
        name: activeVolumeRegion,
        type: "Joint / Boundary Envelope Zone",
        layer: "superficial",
        description: "Outer skin boundary projection and surrounding articular landscape context window.",
        pathologies: ["Articular Capsulitis Strain", "Surface Friction Bruising / Contusion"]
    });

    const linearProximityThreshold = 0.040; // 4cm spatial cutoff parameter window 

    if (jsonDatabase && jsonDatabase.anatomical_database) {
        jsonDatabase.anatomical_database.forEach(entry => {
            let minimumObservedDistance = Infinity;

            for (let i = 0; i < entry.coordinates.length - 1; i++) {
                const nodeA = new THREE.Vector3(...entry.coordinates[i]);
                const nodeB = new THREE.Vector3(...entry.coordinates[i+1]);
                
                const currentDistance = calculateDistanceToTrackSegment(absoluteClickPoint, nodeA, nodeB);
                if (currentDistance < minimumObservedDistance) {
                    minimumObservedDistance = currentDistance;
                }
            }

            if (minimumObservedDistance <= linearProximityThreshold) {
                const lowerLabel = entry.label.toLowerCase();
                const cleanType = entry.type.replace(/_/g, " ");
                const profile = entry.clinical_profile || {};

                // Active Directional Barrier Masking: Block anti-layer crossover leakage
                if (identifyDorsalAspect && (lowerLabel.includes("flexor") || lowerLabel.includes("plantae") || lowerLabel.includes("abductor_hallucis"))) return;
                if (!identifyDorsalAspect && (lowerLabel.includes("extensor") || lowerLabel.includes("tibialis anterior"))) return;

                // Determine strict depths mapping configuration properties natively
                let structuredLayerTier = "mid";
                if (entry.type === "retinaculum" || entry.type === "retinaculum_complex") {
                    structuredLayerTier = "mid"; // Fascial bands sit directly beneath superficial layers
                } else if (lowerLabel.includes("brevis") || lowerLabel.includes("interossei") || lowerLabel.includes("quadratus")) {
                    structuredLayerTier = "deep"; // Short intrinsic profiles mapped to depth floors
                } else if (lowerLabel.includes("longus") || lowerLabel.includes("posterior")) {
                    structuredLayerTier = "deep"; // Long deep structural control lines passing beneath tarsal loops
                }

                layerStackList.push({
                    name: entry.label,
                    type: cleanType,
                    layer: structuredLayerTier,
                    description: profile.description || "Deep track control element.",
                    pathologies: profile.pathologies || ["Tenosynovitis / Mechanically induced inflammation"]
                });
            }
        });
    }

    displayAnatomicalReport(layerStackList);
}

function displayAnatomicalReport(list) {
    const resultsContainer = document.getElementById("diagnostic-results");
    resultsContainer.innerHTML = "";

    const operationalHierarchy = { superficial: 0, mid: 1, deep: 2 };
    list.sort((x, y) => operationalHierarchy[x.layer] - operationalHierarchy[y.layer]);

    list.forEach(item => {
        const card = document.createElement("div");
        card.className = `diag-card ${item.layer}`;
        card.innerHTML = `
            <div class="struct-type">${item.type} — ${item.layer} layer</div>
            <div class="struct-label">${item.name}</div>
            <div class="anatomy-desc">${item.description}</div>
            <div class="pathologies">Differential Options: ${item.pathologies.join(", ")}</div>
        `;
        resultsContainer.appendChild(card);
    });
}

function loadFootMesh() {
    isLoaded = false;
    footGroup.clear();
    new GLTFLoader().load(urls[currentFoot], (gltf) => {
        const model = gltf.scene;
        model.traverse(child => { 
            if(child.isMesh) { child.material = new THREE.MeshStandardMaterial({ color: 0x48484f, roughness: 0.6 }); }
        });
        
        const trackingBoundaries = new THREE.Box3().setFromObject(model);
        const dimensionVector = new THREE.Vector3();
        trackingBoundaries.getSize(dimensionVector);
        const centerOffset = new THREE.Vector3();
        trackingBoundaries.getCenter(centerOffset);

        model.position.x = -centerOffset.x;
        model.position.y = -trackingBoundaries.min.y; 
        model.position.z = -centerOffset.z;

        const dynamicScalingFactor = 1.0 / Math.max(dimensionVector.x, dimensionVector.y, dimensionVector.z);
        model.scale.setScalar(dynamicScalingFactor);
        model.position.multiplyScalar(dynamicScalingFactor);

        footGroup.add(model);
        camera.position.set(0, 1.2, 2.5);
        controls.target.set(0, 0.4, 0);
        isLoaded = true;
    });
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
</html>
